{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "getmcp.fullname" . }}
  labels:
    {{- include "getmcp.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "getmcp.api.name" . }}
                port:
                  number: {{ .Values.api.service.port }}
          - path: /slack
            pathType: Prefix
            backend:
              service:
                name: {{ include "getmcp.api.name" . }}
                port:
                  number: {{ .Values.api.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "getmcp.web.name" . }}
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
