name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in the sections below — they exist because they're the questions we'd ask anyway.

        **For security issues, do NOT file a public bug report.** See [SECURITY.md](https://github.com/Rayenbabdallah/GetMCP/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Concise summary of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact commands, requests, or UI clicks. Copy-pasteable curl/HTTP if relevant.
      placeholder: |
        1. `./deploy/scripts/bootstrap.sh`
        2. `curl -X POST … /proxy/execute …`
        3. Observed: 500
        4. Expected: 202
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / response
      description: API logs (`pino` JSON), HTTP response, or stack trace. Redact secrets.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or release tag.
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running GetMCP?
      options:
        - Local dev (pnpm dev)
        - Docker Compose (docker-compose.prod.yml)
        - Kubernetes (Helm)
        - Other
    validations:
      required: true
