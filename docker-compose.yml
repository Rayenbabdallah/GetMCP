version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: getmcp_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-getmcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-getmcp_platform}
    ports:
      - "5433:5432"
    volumes:
      - getmcp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-getmcp} -d ${POSTGRES_DB:-getmcp_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: getmcp_api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-getmcp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-getmcp_platform}?schema=public
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: getmcp_web
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  getmcp_pgdata:
